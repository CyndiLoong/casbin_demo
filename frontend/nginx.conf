server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    location /ws {
        proxy_pass http://backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_intercept_errors on;

        error_page 401 = @err401;
        error_page 403 = @err403;
        error_page 404 = @err404;
        error_page 500 502 503 504 = @err500;
    }

    location @err401 {
        if ($http_x_requested_with != XMLHttpRequest) {
            return 302 $scheme://$http_host/401;
        }
        add_header Content-Type "application/json" always;
        return 401 '{"code":401,"message":"未提供认证令牌"}';
    }

    location @err403 {
        if ($http_x_requested_with != XMLHttpRequest) {
            return 302 $scheme://$http_host/403;
        }
        add_header Content-Type "application/json" always;
        return 403 '{"code":403,"message":"没有访问权限"}';
    }

    location @err404 {
        if ($http_x_requested_with != XMLHttpRequest) {
            return 302 $scheme://$http_host/404;
        }
        add_header Content-Type "application/json" always;
        return 404 '{"code":404,"message":"请求的资源不存在"}';
    }

    location @err500 {
        if ($http_x_requested_with != XMLHttpRequest) {
            return 302 $scheme://$http_host/500;
        }
        add_header Content-Type "application/json" always;
        return 500 '{"code":500,"message":"服务器内部错误"}';
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
